name: Update snapshot + deploy to Firebase Hosting

on:
  workflow_dispatch:
  schedule:
    # every 10 minutes
    - cron: "*/10 * * * *"

concurrency:
  group: "snapshot-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate latest.json
        env:
          DEBUG_SNAPSHOT: "1"
          DEBUG_DIR: "_artifacts"
        run: npm run build:snapshot

      - name: Upload debug snapshot (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: adurite-debug
          path: _artifacts/**
          if-no-files-found: ignore

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: npx firebase-tools deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}" --token "$FIREBASE_TOKEN"

